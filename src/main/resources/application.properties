spring.application.name=news-scraper

# Set through environment variables for each environment
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/news_scraper}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Expose Spring Data REST endpoints under /api
spring.data.rest.base-path=/api
