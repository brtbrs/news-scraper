x-shared: &shared
  image: n8nio/n8n:${N8N_VERSION}
  restart: unless-stopped
  environment:
    - DB_TYPE=postgresdb
    - DB_POSTGRESDB_HOST=postgres
    - DB_POSTGRESDB_PORT=5432
    - DB_POSTGRESDB_DATABASE=${POSTGRES_DB_NEWS}
    - DB_POSTGRESDB_USER=${POSTGRES_USER_N8N}
    - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD_N8N}
    - EXECUTIONS_MODE=queue
    - QUEUE_BULL_REDIS_HOST=redis
    - QUEUE_HEALTH_CHECK_ACTIVE=true
    - N8N_ENCRYPTION_KEY=${ENCRYPTION_KEY}
    - N8N_RUNNERS_MODE=external
    - N8N_RUNNERS_AUTH_TOKEN=${RUNNERS_AUTH_TOKEN}
    - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
    - OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS=true
    - TZ=Asia/Jakarta
  volumes:
    - ./n8n_storage:/home/node/.n8n
  depends_on:
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy

x-runner: &runner
  image: n8nio/runners:${N8N_VERSION}
  restart: unless-stopped
  environment:
    - N8N_RUNNERS_AUTH_TOKEN=${RUNNERS_AUTH_TOKEN}

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    container_name: postgres
    hostname: postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB_NEWS}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - TZ=Asia/Jakarta
    ports:
      - 5432:5432
    volumes:
      - ./postgres_data:/var/lib/postgresql/data:rw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-newsdibi}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    container_name: redis
    hostname: redis
    environment:
      - TZ=Asia/Jakarta
    volumes:
      - ./redis_storage:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  n8n:
    <<: *shared
    container_name: n8n
    hostname: n8n
    ports:
      - 5678:5678

  n8n-runner:
    <<: *runner
    container_name: n8n-runner
    hostname: n8n-runner
    environment:
      - N8N_RUNNERS_AUTH_TOKEN=${RUNNERS_AUTH_TOKEN}
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:5679
    depends_on:
      - n8n

  n8n-worker:
    <<: *shared
    container_name: n8n-worker
    hostname: n8n-worker
    command: worker
    depends_on:
      - n8n

  n8n-worker-runner:
    <<: *runner
    container_name: n8n-worker-runner
    hostname: n8n-worker-runner
    environment:
      - N8N_RUNNERS_AUTH_TOKEN=${RUNNERS_AUTH_TOKEN}
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n-worker:5679
    depends_on:
      - n8n-worker

  newsapi-service:
    build:
      context: .
      dockerfile: api-service/Dockerfile
    container_name: newsapi-service
    hostname: newsapi-service
    restart: unless-stopped
    environment:
      - SERVER_PORT=8080
      - DB_URL=${POSTGRES_JDBC_DB_URL}
      - DB_USER=${API_DB_USER}
      - DB_PASSWORD=${API_DB_PASSWORD}
      - JPA_DDL_AUTO=validate
      - TZ=Asia/Jakarta
    ports:
      - 8080:8080
    depends_on:
      postgres:
        condition: service_healthy
